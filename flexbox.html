<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Página de Flexbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="flexbox">
    <header>
      <nav>
        <a href="index.html">Regresar</a>
      </nav>
      <h1>Tarjetas de Flexbox</h1>
      <h2 style="text-align: center">Materias Aprobadas hasta ahora</h2>
    </header>
    <div id="contenedor"></div>
    <button id="btn">Resaltar tarjetas</button>
    <button id="btn2">Ordenar tarjetas</button>
    <script>
      const contenedor = document.getElementById("contenedor");
      const btn = document.getElementById("btn");
      const btn2 = document.getElementById("btn2");
      const materiasAprobadas = [
        "Programación I",
        "Arquitectura y Sistemas Operativos",
        "Matemática",
        "Organización Empresarial",
        "Inglés I",
        "Bases de Datos I",
        "Programación II",
        "Probabilidad y Estadística",
      ];

      materiasAprobadas.forEach((materia) => {
        const tarjeta = document.createElement("div");

        tarjeta.className = "tarjeta";
        tarjeta.textContent = materia;

        contenedor.appendChild(tarjeta);
      });

      btn.addEventListener("click", () => {
        document.querySelectorAll(".tarjeta").forEach((tarjeta) => {
          tarjeta.classList.toggle("resaltada");
        });
      });

      btn2.addEventListener("click", () => {
        const tarjetas = Array.from(document.querySelectorAll(".tarjeta"));
        tarjetas.sort((a, b) => a.textContent.localeCompare(b.textContent));
        tarjetas.forEach((tarjeta) => {
          contenedor.appendChild(tarjeta);
        });
      });
    </script>
  </body>
</html>
